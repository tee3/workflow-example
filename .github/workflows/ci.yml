name: ci
on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - '*'
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions:
  contents: read
jobs:
  ci:
    needs:
      - jobs
      - integration
      - tag0
      - tag1
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
  job0:
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
  job1:
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
  jobs:
    needs:
      - job0
      - job1
    runs-on: ubuntu-slim
    steps:
      - run: true
  integration:
    if: github.event_name == 'pull_request'
    needs:
      - integration0
      - integration1
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
  integration0:
    if: github.event_name == 'pull_request'
    needs: job0
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
  integration1:
    if: github.event_name == 'pull_request'
    needs: jobs
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
  tag0:
    if: github.ref_type == 'tag'
    needs: integration
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
  tag1:
    if: github.ref_type == 'tag'
    needs: tag0
    runs-on: ubuntu-slim
    steps:
      - run: printf '::notice::running %s.\n' "${{ github.job}}"
